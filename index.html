<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Procurement Tracker — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <span class="brand-mark">PT · 001</span>
      <h1>Procurement Tracker</h1>
      <p class="subtitle">Sign in to view your projects and RFQs.</p>

      <div id="login-error" class="login-error" hidden></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>

      <p class="login-hint">Demo credentials: <strong>admin</strong> / <strong>procure2026</strong>. Change these in <code>js/app.js</code> before real use.</p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
